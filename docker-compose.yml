services:
  postgres:
    image: postgres:16-alpine
    container_name: neo-watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: NeoWatcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - neo-watcher-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d NeoWatcher"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  neo-watcher-postgres-data: